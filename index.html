<div class="header">
  <h1>Running Coach</h1>
  <p>今日訓練 · Today's Training</p>

  <button class="nav-btn"        onclick="showScreen('settings')" id="nav-settings">⚙️ <span>設定</span></button>

<script>
// ── DATA ─────────────────────────────────────────────────────────────────────
const K = { SETTINGS:'rc_settings', LOGS:'rc_logs', BASELINE:'rc_baseline' };

const getSettings = () => { const r=localStorage.getItem(K.SETTINGS); return r?JSON.parse(r):null; };
const saveSettings = s => localStorage.setItem(K.SETTINGS, JSON.stringify(s));
const getLogs      = () => { const r=localStorage.getItem(K.LOGS);     return r?JSON.parse(r):{}; };
const getBaseline  = () => { const r=localStorage.getItem(K.BASELINE); return r?JSON.parse(r):null; };
const saveBaseline = b => localStorage.setItem(K.BASELINE, JSON.stringify(b));

function saveLog(key, data) {
  const logs = getLogs(); logs[key] = data;
  localStorage.setItem(K.LOGS, JSON.stringify(logs));
}
function logKey(phase, weekNum, type) { return 'p'+phase+'_w'+weekNum+'_'+type; }

// ── PLAN ─────────────────────────────────────────────────────────────────────
function generatePlan(s) {
  const totalDays  = Math.floor((new Date(s.tryoutDate) - new Date(s.startDate)) / 864e5);
  const totalWeeks = Math.max(3, Math.floor(totalDays / 7));
  const p1 = Math.max(1, Math.round(totalWeeks * 0.30));
  const p2 = Math.max(1, Math.round(totalWeeks * 0.40));
  const p3 = Math.max(1, totalWeeks - p1 - p2);
  const sessions = [];
  let wk = 1;
  function addPhase(phase, weeks) {
    for (let w=0; w<weeks; w++, wk++) {
      const isTrial = (w === weeks-1);
      for (const t of ['A','B','C']) sessions.push({ phase, weekNum:wk, sessionType:t, isTrial });
    }
  }
  addPhase(1,p1); addPhase(2,p2); addPhase(3,p3);
  return { sessions, p1, p2, p3, totalWeeks };
}

function nextSession(plan, logs) {
  for (const s of plan.sessions) {
    const l = logs[logKey(s.phase, s.weekNum, s.sessionType)];
    if (!l || (!l.completed && !l.skipped)) return s;
  }
  return null;
}

// ── UI HELPERS ────────────────────────────────────────────────────────────────
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');
  document.getElementById('nav-'+name).classList.add('active');
  ({ today:renderToday, log:renderLog, progress:renderProgress, settings:renderSettings })[name]();
}

function daysUntil(d) {
  const t=new Date(d); t.setHours(0,0,0,0);
  const n=new Date();  n.setHours(0,0,0,0);
  return Math.ceil((t-n)/864e5);
}

function statusDot(best, target, isTime) {
  if (best==null) return '<span class="dot dot-grey"></span>';
  const r = isTime ? (target/best) : (best/target);
  if (r>=1.0)  return '<span class="dot dot-green"></span>';
  if (r>=0.88) return '<span class="dot dot-yellow"></span>';
  return '<span class="dot dot-red"></span>';
}

// ── BASELINE ──────────────────────────────────────────────────────────────────
var showingBaselineForm = false;

function toggleBaselineForm() {
  showingBaselineForm = !showingBaselineForm;
  renderToday();
}

function saveBaselineForm() {
  const b = {
    time30m  : parseFloat(document.getElementById('b30')?.value)   || null,
    time60m  : parseFloat(document.getElementById('b60')?.value)   || null,
    time100m : parseFloat(document.getElementById('b100')?.value)  || null,
    jump     : parseFloat(document.getElementById('bjump')?.value) || null,
    date     : new Date().toISOString()
  };
  if (!b.time60m && !b.jump && !b.time30m && !b.time100m) {
    alert('請至少填寫一項 / Please fill in at least one field'); return;
  }
  saveBaseline(b);
  showingBaselineForm = false;
  alert('基線已記錄！Baseline saved! ✅');
  renderToday();
}

function baselineHTML(settings) {
  const b = getBaseline();
  if (showingBaselineForm) {
    const existing = b || {};
    return `<div class="card">
      <h2>📏 ${b ? '更改基線 Edit Baseline' : '記錄基線 Record Baseline'}</h2>

      </p>
      <div class="form-group">
        <label>30m 時間 (秒 / seconds) · 可選</label>
        <input type="number" id="b30" inputmode="decimal" placeholder="e.g. 7.5" step="0.1" value="${existing.time30m||''}">
      </div>
      <div class="form-group">
        <label>60m 時間 (秒 / seconds)</label>
        <input type="number" id="b60" inputmode="decimal" placeholder="e.g. 14.0" step="0.1" value="${existing.time60m||''}">
        <p class="info-text">目標 Target: ${settings.target60m}s</p>
      </div>
      <div class="form-group">
        <label>100m 時間 (秒 / seconds) · 可選</label>
        <input type="number" id="b100" inputmode="decimal" placeholder="e.g. 25.0" step="0.1" value="${existing.time100m||''}">
        <p class="info-text">目標 Target: ${settings.target100m}s</p>
      </div>
      <div class="form-group">
        <label>立定跳遠距離 Standing Long Jump (米 / meters)</label>
        <input type="number" id="bjump" inputmode="decimal" placeholder="e.g. 1.20" step="0.01" value="${existing.jump||''}">
        <p class="info-text">目標 Target: ${settings.targetJump}m</p>
      </div>
      <button class="btn btn-primary"   onclick="saveBaselineForm()">💾 儲存基線 Save Baseline</button>
      <button class="btn btn-secondary" onclick="toggleBaselineForm()">取消 Cancel</button>
    </div>`;
  }
  if (!b) {
    return `<div class="baseline-prompt">
      <p>第一日訓練前先記錄基線，方便追蹤進步<br>Record a baseline before your first session to track progress</p>
      <button class="btn btn-outline" style="margin-bottom:0;" onclick="toggleBaselineForm()">📏 記錄基線 Record Baseline</button>
    </div>`;
  }
  const parts = [];
  if (b.time60m)  parts.push('60m: '  + b.time60m  + 's');
  if (b.time100m) parts.push('100m: ' + b.time100m + 's');
  if (b.jump)     parts.push('Jump: ' + b.jump     + 'm');
  if (b.time30m)  parts.push('30m: '  + b.time30m  + 's');
  return `<div class="baseline-bar">
    <div class="baseline-bar-left">
      <div class="baseline-bar-label">📏 起點基線 Baseline</div>
      <div class="baseline-bar-vals">${parts.join(' · ')}</div>
    </div>
    <button class="baseline-bar-edit" onclick="toggleBaselineForm()">Edit</button>
  </div>`;
}

// ── TODAY SCREEN ──────────────────────────────────────────────────────────────
function renderToday() {
  const s  = getSettings();
  const el = document.getElementById('todayContent');

  if (!s || !s.startDate || !s.tryoutDate) {
    el.innerHTML = `<div class="no-setup">
      <h3>👟 Welcome!</h3>
      <p>先設定開始日期、Tryout日期和目標<br>Set up start date, tryout date, and targets first</p>
      <button class="btn btn-primary" onclick="showScreen('settings')" style="margin-top:14px;">⚙️ 去設定 Go to Settings</button>
    </div>`; return;
  }

  const plan = generatePlan(s);
  const logs = getLogs();
  const curr = nextSession(plan, logs);

  if (!curr) {
    el.innerHTML = `<div class="card" style="text-align:center;padding:30px 20px;">
      <div style="font-size:52px;margin-bottom:10px;">🏆</div>
      <h2 style="margin-bottom:8px;">全部訓練完成！</h2>
      <p style="color:#888;font-size:14px;">All sessions complete. Good luck at tryouts!</p>
    </div>`; return;
  }

  const total = plan.sessions.length;
  const done  = plan.sessions.filter(x => {
    const l = logs[logKey(x.phase, x.weekNum, x.sessionType)];
    return l && (l.completed || l.skipped);
  }).length;
  const pct   = Math.round((done/total)*100);
  const dLeft = daysUntil(s.tryoutDate);
  const content = SESSIONS[curr.phase+'_'+curr.sessionType];

  el.innerHTML = baselineHTML(s) + (showingBaselineForm ? '' : `
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;">
        <div>
          <span class="phase-badge phase-${curr.phase}">Phase ${curr.phase}: ${PHASE_NAMES[curr.phase]}</span>
          <div style="font-size:12px;color:#999;margin-top:5px;">
            Week ${curr.weekNum} · Session ${curr.sessionType}${curr.isTrial?'<span class="tag-trial">試跑日 Trial</span>':''}
          </div>
        </div>
        <div style="text-align:right;">
          <div style="font-size:26px;font-weight:700;color:#e8500a;">${dLeft}</div>
          <div style="font-size:11px;color:#aaa;">days to tryout</div>
        </div>
      </div>
      <div style="font-size:12px;color:#999;display:flex;justify-content:space-between;margin-bottom:4px;">
        <span>總進度 Progress</span><span>${done}/${total} · ${pct}%</span>
      </div>
      <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
    </div>

    <div class="card">
      <h2>${content.name}</h2>
      <p style="font-size:13px;color:#777;margin-bottom:14px;">${content.intro}</p>
      ${content.drills.map(d=>`
        <div class="drill">
          <div class="drill-title">${d.title}</div>
          <div class="drill-desc">${d.desc}</div>
          <div class="drill-tips">${d.tips.map(t=>'<p>• '+t+'</p>').join('')}</div>
        </div>`).join('')}
    </div>

    <button class="btn btn-primary"   onclick="goToLog()">✅ 完成 Done — Log Result</button>
    <button class="btn btn-secondary" onclick="skipCurrent()">⏩ 跳過 Skip This Session</button>`);
}

// ── SESSION STATE ─────────────────────────────────────────────────────────────
var pendingSession = null;
var editingSession = null;

function goToLog() {
  const s=getSettings(); const plan=generatePlan(s); const logs=getLogs();
  pendingSession = nextSession(plan, logs);
  editingSession = null;
  showScreen('log');
}

function skipCurrent() {
  if (!confirm('確認跳過這個訓練？\nSkip this session?')) return;
  const s=getSettings(); const plan=generatePlan(s); const logs=getLogs();
  const curr = nextSession(plan, logs); if (!curr) return;
  saveLog(logKey(curr.phase, curr.weekNum, curr.sessionType), { skipped:true, completed:false, date:new Date().toISOString() });
  renderToday();
}

function editSessionLog(phase, weekNum, type) {
  editingSession = { phase, weekNum, sessionType:type };
  pendingSession = null;
  showScreen('log');
}

// ── LOG SCREEN ────────────────────────────────────────────────────────────────
function renderLog() {
  const s  = getSettings();
  const el = document.getElementById('logContent');

  if (!s || !s.startDate) {
    el.innerHTML='<div class="card"><p style="color:#aaa;text-align:center;padding:20px;">請先完成設定 / Please set up settings first</p></div>'; return;
  }

  const plan = generatePlan(s);
  const logs = getLogs();
  const sess = editingSession || pendingSession || nextSession(plan, logs);

  if (!sess) {
    el.innerHTML='<div class="card" style="text-align:center;padding:30px;"><p>沒有需要記錄的訓練</p></div>'; return;
  }

  const isEditing = !!editingSession;
  const existing  = isEditing ? (logs[logKey(sess.phase, sess.weekNum, sess.sessionType)] || {}) : {};
  const content   = SESSIONS[sess.phase+'_'+sess.sessionType];
  const fields    = content.logFields;
  const isTrial   = sess.isTrial;

  const show30m  = fields.includes('time30m');
  const show60m  = fields.includes('time60m')  || isTrial;
  const show100m = fields.includes('time100m') || isTrial;
  const showJump = fields.includes('jump')     || isTrial;

  const isSkipped = existing.skipped && !existing.completed;

  if (isSkipped) {
    el.innerHTML = `<div class="card">
      <h2>↩️ 取消跳過 Unskip Session</h2>
      <p style="font-size:14px;color:#666;margin-bottom:20px;">
        Week ${sess.weekNum} · Session ${sess.sessionType} 被標記為跳過<br>
        This session was marked as skipped.
      </p>
      <button class="btn btn-primary"   onclick="unskipSession()">↩️ 放回訓練隊列 Put Back in Queue</button>
      <button class="btn btn-secondary" onclick="logSkippedDirect()">✅ 直接記錄成績 Log It as Done Instead</button>
      <button class="btn btn-secondary" onclick="cancelLog()">取消 Cancel</button>
    </div>`; return;
  }

  el.innerHTML = `<div class="card">
    <h2>${isEditing ? '✏️ 修改記錄 Edit Log' : '記錄結果 Log Result'}</h2>
    <p style="font-size:13px;color:#999;margin-bottom:16px;">
      Week ${sess.weekNum} · Session ${sess.sessionType}
      ${isTrial?'<span class="tag-trial">試跑日 Trial Week</span>':''}
      ${isEditing?'<br><span style="color:#e8500a;font-size:12px;">修改模式 — 之前的數據已載入</span>':''}
    </p>

    ${show30m?`<div class="form-group">
      <label>30m 時間 (秒 / seconds)</label>
      <input type="number" id="l30" inputmode="decimal" placeholder="e.g. 7.2" step="0.1" value="${existing.time30m||''}">
    </div>`:''}

    ${show60m?`<div class="form-group">
      <label>60m 時間 (秒 / seconds)${!isTrial?' · 可選':''}</label>
      <input type="number" id="l60" inputmode="decimal" placeholder="e.g. 12.5" step="0.1" value="${existing.time60m||''}">
      <p class="info-text">目標 Target: ${s.target60m}s</p>
    </div>`:''}

    ${show100m?`<div class="form-group">
      <label>100m 時間 (秒 / seconds)${!isTrial?' · 可選':''}</label>
      <input type="number" id="l100" inputmode="decimal" placeholder="e.g. 21.0" step="0.1" value="${existing.time100m||''}">
      <p class="info-text">目標 Target: ${s.target100m}s</p>
    </div>`:''}

    ${showJump?`<div class="form-group">
      <label>跳遠距離 Long Jump (米 / meters)${!isTrial?' · 可選':''}</label>
      <input type="number" id="ljump" inputmode="decimal" placeholder="e.g. 1.05" step="0.01" value="${existing.jump||''}">
      <p class="info-text">目標 Target: ${s.targetJump}m</p>
    </div>`:''}

    <div class="form-group">
      <label>備注 Note <span style="font-weight:400;color:#aaa;">· 可選</span></label>
      <input type="text" id="lnote" placeholder="e.g. Great reaction starts today / 今日狀態好好" value="${existing.note||''}">
    </div>

    <button class="btn btn-primary"   onclick="submitLog()">${isEditing?'💾 更新 Update':'💾 儲存 Save Result'}</button>
    ${isEditing?`<button class="btn btn-danger" onclick="deleteLog()">🗑 刪除記錄 Delete Log</button>`:''}
    <button class="btn btn-secondary" onclick="cancelLog()">取消 Cancel</button>
  </div>`;
}

function cancelLog() {
  pendingSession = null; editingSession = null;
  showScreen(editingSession ? 'progress' : 'today');
}

function submitLog() {
  const s    = getSettings();
  const plan = generatePlan(s);
  const logs = getLogs();
  const sess = editingSession || pendingSession || nextSession(plan, logs);
  if (!sess) return;

  const key  = logKey(sess.phase, sess.weekNum, sess.sessionType);
  const prev = logs[key] || {};
  saveLog(key, {
    ...prev,
    completed : true,
    skipped   : false,
    date      : prev.date || new Date().toISOString(),
    time30m   : parseFloat(document.getElementById('l30')?.value)   || null,
    time60m   : parseFloat(document.getElementById('l60')?.value)   || null,
    time100m  : parseFloat(document.getElementById('l100')?.value)  || null,
    jump      : parseFloat(document.getElementById('ljump')?.value) || null,
    note      : document.getElementById('lnote')?.value             || ''
  });

  const wasEditing = !!editingSession;
  pendingSession = null; editingSession = null;
  alert(wasEditing ? '更新成功！Updated! ✅' : '儲存成功！Saved! ✅');
  showScreen(wasEditing ? 'progress' : 'today');
}

function unskipSession() {
  const sess = editingSession; if (!sess) return;
  const logs = getLogs();
  delete logs[logKey(sess.phase, sess.weekNum, sess.sessionType)];
  localStorage.setItem(K.LOGS, JSON.stringify(logs));
  editingSession = null;
  alert('已放回！Session is back in the queue ✅');
  showScreen('today');
}

function logSkippedDirect() {
  const sess = editingSession; if (!sess) return;
  const logs = getLogs();
  delete logs[logKey(sess.phase, sess.weekNum, sess.sessionType)];
  localStorage.setItem(K.LOGS, JSON.stringify(logs));
  pendingSession = sess;
  editingSession = null;
  renderLog();
}

function deleteLog() {
  if (!confirm('確認刪除這個記錄？\nDelete this log entry?')) return;
  const sess = editingSession; if (!sess) return;
  const logs = getLogs();
  delete logs[logKey(sess.phase, sess.weekNum, sess.sessionType)];
  localStorage.setItem(K.LOGS, JSON.stringify(logs));
  editingSession = null;
  alert('記錄已刪除 / Log deleted');
  showScreen('progress');
}

// ── PROGRESS SCREEN ───────────────────────────────────────────────────────────
function renderProgress() {
  const s  = getSettings();
  const el = document.getElementById('progressContent');

  if (!s || !s.startDate) {
    el.innerHTML='<div class="card"><p style="color:#aaa;text-align:center;padding:20px;">請先完成設定</p></div>'; return;
  }

  const plan = generatePlan(s);
  const logs = getLogs();
  const bl   = getBaseline();

  const allLogged = plan.sessions
    .map(x=>({...x, log:logs[logKey(x.phase,x.weekNum,x.sessionType)]}))
    .filter(x=>x.log && (x.log.completed || x.log.skipped));
  const allDone = allLogged.filter(x=>x.log.completed);

  function best(field, isTime) {
    const vals = allDone.map(x=>x.log[field]).filter(v=>v!=null);
    if (!vals.length) return null;
    return isTime ? Math.min(...vals) : Math.max(...vals);
  }

  const b60  = best('time60m',  true);
  const b100 = best('time100m', true);
  const bJmp = best('jump',     false);
  const b30  = best('time30m',  true);

  const skipped = plan.sessions.filter(x=>{
    const l=logs[logKey(x.phase,x.weekNum,x.sessionType)]; return l&&l.skipped;
  }).length;

  function metricRow(label, target, bestVal, baseVal, isTime) {
    const bestStr = bestVal != null ? (isTime ? bestVal.toFixed(1)+'s' : bestVal.toFixed(2)+'m') : '--';
    const baseStr = baseVal != null ? (isTime ? baseVal.toFixed(1)+'s' : baseVal.toFixed(2)+'m') : '--';
    return `<div class="target-row">
      <div>
        ${statusDot(bestVal, target, isTime)}
        <span class="target-label">${label} · 目標 ${target}${isTime?'s':'m'}</span>
      </div>
      <div style="text-align:right;">
        <div class="target-value">${bestStr}</div>
        <div class="target-sub">start: ${baseStr}</div>
      </div>
    </div>`;
  }

  el.innerHTML = `
    <div class="card">
      <h2>目標 Targets</h2>
      ${metricRow('60m',  s.target60m,  b60,  bl?.time60m,  true)}
      ${metricRow('100m', s.target100m, b100, bl?.time100m, true)}
      ${metricRow('跳遠', s.targetJump, bJmp, bl?.jump,     false)}
      ${b30||bl?.time30m ? metricRow('30m', '-', b30, bl?.time30m, true) : ''}
    </div>

    <div class="three-col">
      <div class="card"><div style="font-size:26px;font-weight:700;color:#e8500a;">${allDone.length}</div><div style="font-size:12px;color:#aaa;">完成</div></div>
      <div class="card"><div style="font-size:26px;font-weight:700;color:#999;">${skipped}</div><div style="font-size:12px;color:#aaa;">跳過</div></div>
      <div class="card"><div style="font-size:26px;font-weight:700;">${plan.sessions.length-allDone.length-skipped}</div><div style="font-size:12px;color:#aaa;">剩餘</div></div>
    </div>

    <div class="card">
      <h2>訓練記錄 Session Log</h2>
      <p style="font-size:12px;color:#aaa;margin-bottom:10px;">點擊任何一行可以修改 / Tap any row to edit</p>
      ${allLogged.length===0
        ? '<p style="color:#aaa;text-align:center;padding:20px 0;font-size:14px;">未有記錄<br>No sessions logged yet</p>'
        : `<table class="progress-table">
            <thead><tr><th>Week</th><th>Ph</th><th>60m</th><th>Jump</th><th>Note</th><th></th></tr></thead>
            <tbody>
              ${allLogged.slice().reverse().map(x=>{
                const isSkipped = x.log.skipped;
                return `<tr class="data-row" onclick="editSessionLog(${x.phase},${x.weekNum},'${x.sessionType}')" style="${isSkipped?'opacity:0.45;':''}">
                  <td>W${x.weekNum}${x.sessionType}</td>
                  <td><span class="phase-badge phase-${x.phase}" style="padding:2px 6px;font-size:11px;">P${x.phase}</span></td>
                  <td>${isSkipped?'<i>skipped</i>':x.log.time60m?x.log.time60m+'s':x.log.time100m?x.log.time100m+'s':x.log.time30m?x.log.time30m+'s':'-'}</td>
                  <td>${isSkipped?'':x.log.jump?x.log.jump+'m':'-'}</td>
                  <td><span class="note-cell">${x.log.note||''}</span></td>
                  <td style="font-size:14px;">${isSkipped?'↩️':'✏️'}</td>
                </tr>`;
              }).join('')}
            </tbody>
          </table>`}
    </div>

    <div class="card">
      <h2>備份 Backup Data</h2>
      <p style="font-size:13px;color:#777;margin-bottom:12px;">所有資料存在此電話。複製後貼入備忘錄保存。<br>All data is on this phone. Copy and paste into Notes to back up.</p>
      <button class="btn btn-outline" onclick="copyBackup()">📋 複製所有資料 Copy All Data</button>
    </div>`;
}

function copyBackup() {
  const data = JSON.stringify({ settings:getSettings(), logs:getLogs(), baseline:getBaseline() }, null, 2);
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(data).then(()=>alert('已複製！Copied!\n\nPaste into Notes app to save a backup.')).catch(()=>fallbackCopy(data));
  } else { fallbackCopy(data); }
}
function fallbackCopy(text) {
  const ta=document.createElement('textarea'); ta.value=text;
  ta.style.cssText='position:fixed;top:-9999px;left:-9999px;';
  document.body.appendChild(ta); ta.focus(); ta.select();
  try { document.execCommand('copy'); alert('已複製！Copied!\n\nPaste into Notes app.'); } catch(e) { alert('Please manually copy:\n\n'+text); }
  document.body.removeChild(ta);
}

// ── SETTINGS SCREEN ───────────────────────────────────────────────────────────

    <div class="card">

      <div style="margin-bottom:14px;">

        <div style="font-size:13px;color:#444;line-height:1.6;">
          • 「跑過終點線，唔係跑到終點線」<br>"Run THROUGH the line, not TO it"<br>

          • 「手臂由臉頰擺到口袋」<br>"Arms swing cheek to pocket"<br>
          • 「眼望前方，唔好望地」<br>"Eyes forward, not down"
        </div>
      </div>

      <div style="margin-bottom:14px;">
        <div style="font-size:13px;font-weight:700;color:#1565c0;margin-bottom:6px;">🦘 Standing Long Jump · 立定跳遠</div>
        <div style="font-size:13px;color:#444;line-height:1.6;">
          • 「大彎曲」(膝蓋彎得似坐凳邊)<br>"Big knee bend" (like sitting on low stool)<br>
          • 「向天空丟手」<br>"Throw your hands at the sky"<br>
          • 「跳過個杯/條線」(外部專注)<br>"Jump PAST the cone/line" (external focus)<br>
          • 「俾我睇你對鞋」(落地腳向前伸)<br>"Show me your shoes" (extend feet forward)<br>

function planSummaryHTML(s) {
  const p=generatePlan(s); const dLeft=daysUntil(s.tryoutDate);
  return `<div class="card"><h2>訓練計劃摘要 Plan Summary</h2>
    <div class="summary-row"><span class="summary-label">距離Tryout</span><span class="summary-val">${dLeft} 天 days</span></div>
    <div class="summary-row"><span class="summary-label">總週數 Total weeks</span><span class="summary-val">${p.totalWeeks}</span></div>
    <div class="summary-row"><span class="summary-label">Phase 1 基礎期</span><span class="summary-val">${p.p1} weeks</span></div>
    <div class="summary-row"><span class="summary-label">Phase 2 發展期</span><span class="summary-val">${p.p2} weeks</span></div>
    <div class="summary-row"><span class="summary-label">Phase 3 衝刺期</span><span class="summary-val">${p.p3} weeks</span></div>
    <div class="summary-row"><span class="summary-label">總訓練節數</span><span class="summary-val">${p.sessions.length}</span></div>
  </div>`;
}

function resetAll() {
  if (!confirm('確認清除所有資料？此操作不可撤銷。\nClear all data? This cannot be undone.')) return;
  localStorage.removeItem(K.LOGS);
  localStorage.removeItem(K.BASELINE);
  showingBaselineForm = false;
  pendingSession = null;
  editingSession = null;
  alert('已重置！All data cleared ✅');
  renderSettings();
}

function saveSettingsForm() {
  const startDate=document.getElementById('sStart').value;
  const tryoutDate=document.getElementById('sTryout').value;
  if (!startDate||!tryoutDate) { alert('請填寫開始日期和Tryout日期'); return; }
  if (new Date(tryoutDate)<=new Date(startDate)) { alert('Tryout日期必須在開始日期之後'); return; }
  saveSettings({ childName:document.getElementById('sName').value||'', startDate, tryoutDate,
    target60m:parseFloat(document.getElementById('s60').value)||12.0,
    target100m:parseFloat(document.getElementById('s100').value)||20.0,
    targetJump:parseFloat(document.getElementById('sJump').value)||1.20 });
  alert('儲存成功！Settings saved! ✅');
  renderSettings();
}
