// ── DATA ──────────────────────────────────────────────
const STORE_SETTINGS = 'rc_settings';
const STORE_LOGS     = 'rc_logs';

function getSettings() {
  const raw = localStorage.getItem(STORE_SETTINGS);
  return raw ? JSON.parse(raw) : null;
}
function saveSettings(s) {
  localStorage.setItem(STORE_SETTINGS, JSON.stringify(s));
}
function getLogs() {
  const raw = localStorage.getItem(STORE_LOGS);
  return raw ? JSON.parse(raw) : {};
}
function saveLog(key, data) {
  const logs = getLogs();
  logs[key] = data;
  localStorage.setItem(STORE_LOGS, JSON.stringify(logs));
}
function logKey(phase, weekNum, type) {
  return 'p' + phase + '_w' + weekNum + '_' + type;
}

// ── PLAN GENERATION ───────────────────────────────────
function generatePlan(s) {
  const start  = new Date(s.startDate);
  const tryout = new Date(s.tryoutDate);
  const totalDays  = Math.floor((tryout - start) / 864e5);
  const totalWeeks = Math.max(3, Math.floor(totalDays / 7));

  const p1 = Math.max(1, Math.round(totalWeeks * 0.30));
  const p2 = Math.max(1, Math.round(totalWeeks * 0.40));
  const p3 = Math.max(1, totalWeeks - p1 - p2);

  const sessions = [];
  let wk = 1;

  function addPhase(phase, weeks) {
    for (let w = 0; w < weeks; w++, wk++) {
      const isTrial = (w === weeks - 1);
      for (const t of ['A','B','C']) {
        sessions.push({ phase, weekNum: wk, sessionType: t, isTrial });
      }
    }
  }
  addPhase(1, p1);
  addPhase(2, p2);
  addPhase(3, p3);

  return { sessions, p1, p2, p3, totalWeeks };
}

function nextSession(plan, logs) {
  for (const s of plan.sessions) {
    const l = logs[logKey(s.phase, s.weekNum, s.sessionType)];
    if (!l || (!l.completed && !l.skipped)) return s;
  }
  return null;
}

// ── UI HELPERS ────────────────────────────────────────
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  document.getElementById('nav-' + name).classList.add('active');
  const renders = { today: renderToday, log: renderLog, progress: renderProgress, settings: renderSettings };
  renders[name]();
}

function daysUntil(dateStr) {
  const t = new Date(dateStr); t.setHours(0,0,0,0);
  const n = new Date();        n.setHours(0,0,0,0);
  return Math.ceil((t - n) / 864e5);
}

function statusDot(best, target, isTime) {
  if (best === null || best === undefined) return '<span class="dot dot-grey"></span>';
  const ratio = isTime ? (target / best) : (best / target);
  if (ratio >= 1.0) return '<span class="dot dot-green"></span>';
  if (ratio >= 0.88) return '<span class="dot dot-yellow"></span>';
  return '<span class="dot dot-red"></span>';
}

var pendingKey = null;
var pendingSession = null;

function goToLog() {
  const s    = getSettings();
  const plan = generatePlan(s);
  const logs = getLogs();
  pendingSession = nextSession(plan, logs);
  if (pendingSession) {
    pendingKey = logKey(pendingSession.phase, pendingSession.weekNum, pendingSession.sessionType);
  }
  showScreen('log');
}

function skipCurrent() {
  if (!confirm('確認跳過這個訓練？\nSkip this session?')) return;
  const s    = getSettings();
  const plan = generatePlan(s);
  const logs = getLogs();
  const curr = nextSession(plan, logs);
  if (!curr) return;
  saveLog(logKey(curr.phase, curr.weekNum, curr.sessionType), { skipped: true, completed: false, date: new Date().toISOString() });
  renderToday();
}

function renderLog() {
  const s  = getSettings();

    el.innerHTML = '<div class="card"><p style="color:#aaa;text-align:center;padding:20px;">請先完成設定 / Please set up settings first</p></div>';

  const plan = generatePlan(s);
  const logs = getLogs();
  const sess = pendingSession || nextSession(plan, logs);

    return;
  }

  const content  = SESSIONS[sess.phase + '_' + sess.sessionType];
  const fields   = content.logFields;
  const isTrial  = sess.isTrial;

  const show30m  = fields.includes('time30m');
  const show60m  = fields.includes('time60m') || isTrial;

        <input type="number" id="l30" inputmode="decimal" placeholder="e.g. 7.2" step="0.1" min="4" max="20">
      </div>` : ''}

      ${show60m ? `<div class="form-group">
        <label>60m 時間 Time (秒 / seconds)${!isTrial ? ' · 可選 optional' : ''}</label>
        <input type="number" id="l60" inputmode="decimal" placeholder="e.g. 12.5" step="0.1" min="8" max="25">
        <p class="info-text">目標 Target: ${s.target60m}s</p>
      </div>` : ''}

        <label>100m 時間 Time (秒 / seconds)${!isTrial ? ' · 可選 optional' : ''}</label>
        <input type="number" id="l100" inputmode="decimal" placeholder="e.g. 21.0" step="0.1" min="12" max="40">

      <div class="form-group">
        <label>備注 Note <span style="font-weight:400;color:#aaa;">· 可選 optional</span></label>
        <input type="text" id="lnote" placeholder="e.g. Great reaction starts today / 今日狀態好好">
      </div>

      <button class="btn btn-primary" onclick="submitLog()">💾 儲存 Save Result</button>
      <button class="btn btn-secondary" onclick="cancelLog()">取消 Cancel</button>
    </div>`;
}

function cancelLog() {
  pendingSession = null;
  pendingKey     = null;
  showScreen('today');
}

function submitLog() {
  const s    = getSettings();
  const plan = generatePlan(s);
  const logs = getLogs();
  const sess = pendingSession || nextSession(plan, logs);
  if (!sess) return;

  const key = pendingKey || logKey(sess.phase, sess.weekNum, sess.sessionType);
  const data = {
    completed: true,
    skipped:   false,
    date:      new Date().toISOString(),
    time30m:   parseFloat(document.getElementById('l30')?.value)   || null,
    time60m:   parseFloat(document.getElementById('l60')?.value)   || null,
    time100m:  parseFloat(document.getElementById('l100')?.value)  || null,
    jump:      parseFloat(document.getElementById('ljump')?.value) || null,
    note:      document.getElementById('lnote')?.value             || ''
  };

  saveLog(key, data);
  pendingSession = null;
  pendingKey     = null;
  alert('儲存成功！Saved! ✅');
  showScreen('today');
}

function renderProgress() {
  const s  = getSettings();

    el.innerHTML = '<div class="card"><p style="color:#aaa;text-align:center;padding:20px;">請先完成設定 / Set up settings first</p></div>';
    return;

    .map(x => ({ ...x, log: logs[logKey(x.phase, x.weekNum, x.sessionType)] }))
    .filter(x => x.log && x.log.completed);

  function best(field, isTime) {
    const vals = allDone.map(x => x.log[field]).filter(v => v != null);
    if (!vals.length) return null;
    return isTime ? Math.min(...vals) : Math.max(...vals);
  }

  const b60  = best('time60m',  true);
  const b100 = best('time100m', true);
  const bJmp = best('jump',     false);
  const b30  = best('time30m',  true);

  el.innerHTML = `

        <div>${statusDot(b100, s.target100m, true )} <span class="target-label">100m · 目標 ${s.target100m}s</span></div>
        <div style="text-align:right;">
          <div class="target-value">${b100 ? b100.toFixed(1) + 's' : '--'}</div>
          <div class="target-sub">best so far</div>
        </div>
      </div>
      <div class="target-row">
        <div>${statusDot(bJmp, s.targetJump, false)} <span class="target-label">跳遠 · 目標 ${s.targetJump}m</span></div>
        <div style="text-align:right;">
          <div class="target-value">${bJmp ? bJmp.toFixed(2) + 'm' : '--'}</div>
          <div class="target-sub">best so far</div>
        </div>
      </div>
      ${b30 ? `<div class="target-row">
        <div><span class="target-label">30m 最快 Best 30m</span></div>
        <div style="text-align:right;"><div class="target-value">${b30.toFixed(1)}s</div></div>
      </div>` : ''}
    </div>

    <div style="display:flex;gap:10px;margin-bottom:12px;">
      <div class="card" style="flex:1;text-align:center;padding:14px 10px;margin-bottom:0;">
        <div style="font-size:26px;font-weight:700;color:#e8500a;">${allDone.length}</div>
        <div style="font-size:12px;color:#aaa;">完成 done</div>
      </div>
      <div class="card" style="flex:1;text-align:center;padding:14px 10px;margin-bottom:0;">
        <div style="font-size:26px;font-weight:700;color:#999;">${skipped}</div>
        <div style="font-size:12px;color:#aaa;">跳過 skipped</div>
      </div>
      <div class="card" style="flex:1;text-align:center;padding:14px 10px;margin-bottom:0;">
        <div style="font-size:26px;font-weight:700;color:#1a1a1a;">${plan.sessions.length - allDone.length - skipped}</div>
        <div style="font-size:12px;color:#aaa;">剩餘 left</div>
      </div>
    </div>

      <h2>記錄 Session Log</h2>
      ${allDone.length === 0
        ? '<p style="color:#aaa;text-align:center;padding:20px 0;font-size:14px;">未有記錄<br>No sessions logged yet</p>'

                <td>${x.log.time60m  ? x.log.time60m  + 's' : '-'}</td>
                <td>${x.log.time100m ? x.log.time100m + 's' : '-'}</td>

                <td><span class="note-cell">${x.log.note || ''}</span></td>
              </tr>`).join('')}
            </tbody>
          </table>`}
    </div>

    <div class="card">
      <h2>備份 Backup Data</h2>
      <p style="font-size:13px;color:#777;margin-bottom:12px;">

        All data is on this phone. Copy and paste into Notes to back up.
      </p>

}

function copyBackup() {
  const data = JSON.stringify({ settings: getSettings(), logs: getLogs() }, null, 2);
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(data)
      .then(() => alert('已複製！Copied!\n\nPaste into Notes app to save a backup.'))
      .catch(() => fallbackCopy(data));
  } else {
    fallbackCopy(data);
  }
}
function fallbackCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;top:-9999px;left:-9999px;';
  document.body.appendChild(ta);
  ta.focus(); ta.select();
  try { document.execCommand('copy'); alert('已複製！Copied!\n\nPaste into Notes app to save a backup.'); }
  catch(e) { alert('Please manually copy the data:\n\n' + text); }
  document.body.removeChild(ta);
}

    <div class="summary-row"><span class="summary-label">距離Tryout / Days to tryout</span><span class="summary-val">${dLeft} 天 days</span></div>
    <div class="summary-row"><span class="summary-label">總週數 Total weeks</span><span class="summary-val">${p.totalWeeks}</span></div>
    <div class="summary-row"><span class="summary-label">Phase 1 基礎期</span><span class="summary-val">${p.p1} weeks</span></div>
    <div class="summary-row"><span class="summary-label">Phase 2 發展期</span><span class="summary-val">${p.p2} weeks</span></div>
    <div class="summary-row"><span class="summary-label">Phase 3 衝刺期</span><span class="summary-val">${p.p3} weeks</span></div>
    <div class="summary-row"><span class="summary-label">總訓練節數 Total sessions</span><span class="summary-val">${p.sessions.length}</span></div>
  </div>`;
}

function saveSettingsForm() {
  const startDate  = document.getElementById('sStart').value;
  const tryoutDate = document.getElementById('sTryout').value;

  if (!startDate || !tryoutDate) {
    alert('請填寫開始日期和Tryout日期\nPlease fill in start date and tryout date');
    return;
  }
  if (new Date(tryoutDate) <= new Date(startDate)) {
    alert('Tryout日期必須在開始日期之後\nTryout date must be after start date');
    return;
  }

  saveSettings({
    childName:   document.getElementById('sName').value   || '',
    startDate,
    tryoutDate,
    target60m:   parseFloat(document.getElementById('s60').value)   || 12.0,
    target100m:  parseFloat(document.getElementById('s100').value)  || 20.0,
    targetJump:  parseFloat(document.getElementById('sJump').value) || 1.20
  });

  alert('儲存成功！Settings saved! ✅');
  renderSettings();
}

// ── INIT ──────────────────────────────────────────────
renderToday();
